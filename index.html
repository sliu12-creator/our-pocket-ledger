<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>我们的小账本 v1.3.2</title>
<style>
*{box-sizing:border-box}
body{
font-family:-apple-system,BlinkMacSystemFont,"PingFang SC",sans-serif;
min-height:100vh;
margin:0;
color:#27495c;
background:
radial-gradient(circle at 18% 8%,rgba(255,255,255,.95),rgba(255,255,255,0) 30%),
radial-gradient(circle at 82% 16%,rgba(198,235,241,.58),rgba(198,235,241,0) 34%),
linear-gradient(180deg,#f4fbff 0%,#e7f4f8 44%,#dbeef2 100%);
}
body:before{
content:"";
position:fixed;
inset:0;
pointer-events:none;
background:linear-gradient(135deg,rgba(255,255,255,.42),rgba(213,236,241,.16) 42%,rgba(255,255,255,.28));
}
.wrap{position:relative;max-width:760px;margin:auto;padding:calc(18px + env(safe-area-inset-top)) 18px calc(28px + env(safe-area-inset-bottom))}
.card{
background:rgba(255,255,255,.56);
border:1px solid rgba(255,255,255,.78);
border-radius:24px;
-webkit-backdrop-filter:blur(18px) saturate(135%);
backdrop-filter:blur(18px) saturate(135%);
padding:20px;
box-shadow:0 18px 45px rgba(84,126,144,.15),inset 0 1px 0 rgba(255,255,255,.72);
margin-bottom:16px;
}
h2,h3{margin:0 0 12px;font-weight:700;letter-spacing:0}
h2{font-size:25px;color:#244a5d}
h3{font-size:19px;color:#2b5264}
label{display:block;margin:4px 0 0;font-size:14px;color:#547183}
input,select,textarea,button{width:100%;box-sizing:border-box;font:inherit}
input,select,textarea{
padding:13px 14px;
border-radius:16px;
border:1px solid rgba(168,201,211,.72);
background:rgba(255,255,255,.68);
color:#27495c;
outline:none;
margin-top:7px;
margin-bottom:13px;
box-shadow:inset 0 1px 0 rgba(255,255,255,.78);
}
input:focus,select:focus,textarea:focus{border-color:#8bc8d5;box-shadow:0 0 0 4px rgba(143,202,214,.22)}
textarea{height:76px;resize:none}
button{
padding:14px;
border:none;
border-radius:999px;
background:linear-gradient(180deg,#8fcfdb,#69b7c8);
color:white;
cursor:pointer;
box-shadow:0 10px 22px rgba(83,153,171,.22);
}
button:active{transform:scale(.99)}
#list{display:grid;gap:16px}
.dateGroup{display:grid;gap:12px}
.dateTitle{
display:flex;
align-items:center;
gap:10px;
margin:4px 2px 0;
font-size:14px;
font-weight:650;
color:#557888;
}
.dateTitle:before,.dateTitle:after{content:"";height:1px;flex:1;background:rgba(137,174,187,.28)}
.item{
position:relative;
min-height:104px;
padding:16px 92px 16px 16px;
border:1px solid rgba(255,255,255,.76);
border-radius:20px;
background:rgba(255,255,255,.48);
-webkit-backdrop-filter:blur(16px) saturate(140%);
backdrop-filter:blur(16px) saturate(140%);
box-shadow:0 14px 32px rgba(82,124,143,.13),inset 0 1px 0 rgba(255,255,255,.72);
}
.item b{display:block;margin-bottom:7px;font-size:15px;font-weight:600;color:#416879}
.subcategory{display:block;margin-bottom:7px;font-size:14px;color:#6f919e}
.amount{display:block;margin-bottom:8px;font-size:30px;font-weight:760;color:#2E6F92}
.amount.income{color:#4FAF72}
.record-time{display:block;margin-bottom:4px;color:#7897a4}
.record-note{display:block;line-height:1.45;color:#8aa2ab}
.actions{position:absolute;right:12px;bottom:12px;display:flex;gap:8px}
.iconBtn{
display:grid;
place-items:center;
width:34px;
height:34px;
padding:0;
border-radius:50%;
background:rgba(255,255,255,.62);
color:#4e7988;
box-shadow:0 8px 18px rgba(77,126,143,.14),inset 0 1px 0 rgba(255,255,255,.78);
}
.iconBtn.delete{color:#9d6670}
.meta{color:#789}
.msg{
background:rgba(246,252,253,.58);
border:1px solid rgba(255,255,255,.7);
border-radius:18px;
padding:14px;
margin-top:14px;
color:#4e7180;
}
.small{font-size:.9em;color:#678}
.monthlySummary{
display:grid;
gap:8px;
margin:0 0 14px;
padding:11px 13px;
border:1px solid rgba(255,255,255,.72);
border-radius:16px;
background:rgba(239,250,252,.48);
box-shadow:inset 0 1px 0 rgba(255,255,255,.68);
}
.summaryHeader{display:flex;align-items:center;justify-content:space-between;gap:10px}
.summaryTitle{font-size:15px;font-weight:650;color:#416879}
.summaryStatistics,.budgetSettings{display:grid;place-items:center;width:36px;height:36px;padding:0;background:rgba(255,255,255,.64);color:#4c7180;box-shadow:inset 0 1px 0 rgba(255,255,255,.78);font-size:16px}
.summaryGrid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px}
.summaryItem{min-width:0}
.summaryLabel{display:block;margin-bottom:3px;font-size:13px;color:#7897a4}
.summaryAmount{display:block;font-size:17px;font-weight:700;color:#2E6F92;white-space:nowrap}
.summaryAmount.income{color:#4FAF72}
.monthlyBudget{display:grid;gap:8px;margin:0 0 14px;padding:11px 13px;border:1px solid rgba(255,255,255,.72);border-radius:16px;background:rgba(237,249,245,.48);box-shadow:inset 0 1px 0 rgba(255,255,255,.68)}
.budgetHeader{display:flex;align-items:center;justify-content:space-between;gap:10px}
.budgetTitle{font-size:15px;font-weight:650;color:#416879}
.budgetGrid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px 14px}
.budgetLabel{display:block;margin-bottom:3px;font-size:13px;color:#7897a4}
.budgetValue{display:block;font-size:16px;font-weight:700;color:#2E6F92;white-space:nowrap}
.budgetProgressRow{display:flex;align-items:center;gap:9px}
.budgetProgressTrack{height:5px;flex:1;overflow:hidden;border-radius:999px;background:rgba(121,174,185,.18)}
.budgetProgressBar{height:100%;width:0;border-radius:inherit;background:linear-gradient(90deg,#8fcfdb,#69b7c8);transition:width .2s ease}
.budgetProgressBar.over{background:linear-gradient(90deg,#e3a1a6,#c97880)}
.budgetProgressText{min-width:34px;text-align:right;font-size:12px;font-weight:650;color:#678}
.budgetHint{font-size:13px;color:#678;line-height:1.4}
.recentSection{margin:0 0 14px}
.recentSection h3{margin-bottom:8px;font-size:17px}
.recentList{display:grid;gap:8px}
.recentItem{
display:grid;
gap:4px;
padding:11px 13px;
border:1px solid rgba(255,255,255,.72);
border-radius:16px;
background:rgba(255,255,255,.42);
box-shadow:inset 0 1px 0 rgba(255,255,255,.68);
}
.recentMain{display:flex;align-items:baseline;justify-content:space-between;gap:12px;min-width:0}
.recentLabel{min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:15px;font-weight:600;color:#416879}
.recentAmount{flex:0 0 auto;font-size:17px;font-weight:700;color:#2E6F92;white-space:nowrap}
.recentAmount.income{color:#4FAF72}
.recentTime{font-size:13px;color:#7897a4}
.viewLedgerBtn{margin:0 0 16px;padding:12px;background:rgba(255,255,255,.66);color:#4c7180;box-shadow:inset 0 1px 0 rgba(255,255,255,.78)}
.fullLedgerView{
position:fixed;
z-index:1100;
inset:0;
overflow-y:auto;
padding:calc(18px + env(safe-area-inset-top)) 18px calc(28px + env(safe-area-inset-bottom));
background:
radial-gradient(circle at 18% 8%,rgba(255,255,255,.95),rgba(255,255,255,0) 30%),
linear-gradient(180deg,#f4fbff 0%,#e7f4f8 44%,#dbeef2 100%);
}
.fullLedgerHeader{display:flex;align-items:center;gap:12px;max-width:760px;margin:0 auto 18px}
.fullLedgerHeader h2{margin:0;font-size:22px}
.backBtn{width:auto;padding:9px 12px;border-radius:999px;background:rgba(255,255,255,.68);color:#4c7180;box-shadow:inset 0 1px 0 rgba(255,255,255,.78)}
.fullLedgerList{display:grid;gap:16px;max-width:760px;margin:0 auto}
.statisticsContent{display:grid;gap:16px;max-width:760px;margin:0 auto}
.statisticsSection{display:grid;gap:16px;padding:16px;border:1px solid rgba(255,255,255,.74);border-radius:20px;background:rgba(255,255,255,.48);box-shadow:inset 0 1px 0 rgba(255,255,255,.7)}
.statisticsSectionHeader{display:flex;align-items:center;justify-content:space-between;gap:10px}
.statisticsSection h3{margin:0;font-size:18px}
.statisticsMartyBtn,.statisticsPickerBtn{display:grid;place-items:center;width:34px;height:34px;padding:0;background:rgba(255,255,255,.64);color:#4c7180;box-shadow:inset 0 1px 0 rgba(255,255,255,.78);font-size:16px}
.statisticsMartyNotice{margin:-7px 0 1px;font-size:13px;color:#7897a4;white-space:pre-line}
.statisticsDonut{display:grid;place-items:center;width:min(52vw,190px);aspect-ratio:1;margin:0 auto;border-radius:50%;background:rgba(220,240,244,.55);box-shadow:inset 0 1px 0 rgba(255,255,255,.76),0 12px 26px rgba(82,124,143,.1)}
.statisticsDonutCenter{display:grid;place-items:center;align-content:center;width:62%;aspect-ratio:1;padding:10px;border-radius:50%;background:rgba(250,254,255,.9);text-align:center;box-shadow:inset 0 1px 0 rgba(255,255,255,.84)}
.statisticsDonutCenter strong{font-size:17px;color:#2E6F92;white-space:nowrap}
.statisticsDonutCenter span{margin-top:3px;font-size:11px;color:#7897a4}
.statisticsTrendChart{padding-top:2px}
.statisticsTrendChart svg{display:block;width:100%;height:auto;overflow:visible}
.statisticsTrendLabel{fill:#7897a4;font-size:11px}
.statisticsTrendDetails{display:flex;align-items:baseline;justify-content:space-between;gap:12px;margin:-7px 0 1px;padding:8px 10px;border:1px solid rgba(255,255,255,.72);border-radius:12px;background:rgba(246,252,253,.48);font-size:13px;color:#7897a4}
.statisticsTrendDetails strong{color:#2E6F92;font-size:15px}
.statisticsTrendBaseline{stroke:rgba(121,151,164,.26);stroke-width:1}
.statisticsTrendArea{fill:#8fcfdb;fill-opacity:.16}
.statisticsTrendLine{fill:none;stroke:#69b7c8;stroke-width:3;stroke-linecap:round;stroke-linejoin:round}
.statisticsCategoryList{display:grid;gap:2px}
.statisticsCategoryItem{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:10px 2px;border-top:1px solid rgba(137,174,187,.18)}
.statisticsCategoryLabel{display:flex;align-items:center;gap:8px;min-width:0;color:#416879;font-size:15px}
.statisticsColorDot{width:10px;height:10px;flex:0 0 auto;border-radius:50%}
.statisticsCategoryPercent{flex:0 0 auto;font-size:14px;font-weight:700;color:#2E6F92}
.statisticsEmpty{display:grid;justify-items:center;gap:8px;padding:22px 10px 16px;text-align:center;color:#7897a4;line-height:1.55}
.statisticsEmptyIcon{font-size:28px}
.calendarContent{display:grid;gap:16px;max-width:760px;margin:0 auto}
.calendarToolbar{display:flex;align-items:center;justify-content:space-between;gap:8px}
.calendarToolbar button{width:auto;padding:9px 11px;background:rgba(255,255,255,.68);color:#4c7180;box-shadow:inset 0 1px 0 rgba(255,255,255,.78)}
.calendarTitleActions{display:flex;align-items:center;gap:6px;min-width:0}
.calendarMonthTitle{width:auto!important;padding:0!important;background:transparent!important;color:#416879!important;box-shadow:none!important;font-size:17px;font-weight:700;white-space:nowrap}
.calendarTodayBtn{padding:7px 8px!important;font-size:13px}
.calendarWeekdays,.calendarGrid{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:5px}
.calendarWeekdays span{text-align:center;font-size:12px;color:#7897a4}
.calendarDay{
display:grid;
place-items:center;
align-content:center;
gap:2px;
min-width:0;
aspect-ratio:1;
padding:4px;
border-radius:12px;
background:rgba(255,255,255,.2);
color:#7897a4;
box-shadow:inset 0 1px 0 rgba(255,255,255,.68);
}
.calendarDay.empty{background:transparent;box-shadow:none;pointer-events:none}
.calendarDay.hasRecords{background:rgba(224,244,247,.72);color:#416879;border:1px solid rgba(255,255,255,.76)}
.calendarDay.selected{background:rgba(143,202,214,.32);color:#244a5d}
.calendarDay.withinBudget{background:rgba(226,243,233,.78);color:#3f765a}
.calendarDay.overBudget{background:rgba(249,231,233,.82);color:#9b6169}
.calendarDay.hasRecords .calendarDayNumber{font-weight:760}
.calendarDayNumber{font-size:14px;font-weight:650}
.calendarDot{width:4px;height:4px;border-radius:50%;background:#6daebe}
.calendarDaySummary{padding:14px;border:1px solid rgba(255,255,255,.72);border-radius:16px;background:rgba(255,255,255,.46)}
.calendarDaySummary h3{margin-bottom:10px;font-size:17px}
.dailySummary{display:flex;gap:14px;margin-bottom:12px;font-size:13px;color:#7897a4}
.dailySummary strong{display:block;margin-top:3px;font-size:15px;color:#2E6F92}
.dailySummary .income{color:#4FAF72}
.calendarDayList{display:grid;gap:8px}
.calendarRecord{display:flex;align-items:baseline;justify-content:space-between;gap:12px;padding:10px 0;border-top:1px solid rgba(137,174,187,.2)}
.calendarRecordLabel{min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:14px;color:#416879}
.calendarRecordAmount{flex:0 0 auto;font-size:15px;font-weight:700;color:#2E6F92;white-space:nowrap}
.calendarRecordAmount.income{color:#4FAF72}
.calendarPickerMask{position:fixed;z-index:1150;inset:0;display:grid;place-items:center;padding:18px;background:rgba(52,87,101,.18);-webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px)}
.calendarPicker{width:min(100%,340px);padding:18px;border:1px solid rgba(255,255,255,.82);border-radius:20px;background:rgba(255,255,255,.8);box-shadow:0 22px 48px rgba(49,86,103,.22);-webkit-backdrop-filter:blur(18px) saturate(135%);backdrop-filter:blur(18px) saturate(135%)}
.calendarPickerHeader{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.calendarPickerHeader h3{margin:0;font-size:17px}
.calendarPickerClose{width:34px;height:34px;padding:0;border-radius:50%;background:rgba(255,255,255,.68);color:#4c7180;box-shadow:inset 0 1px 0 rgba(255,255,255,.78)}
.pickerYearToolbar{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:10px}
.pickerYearToolbar button{width:auto;padding:7px 10px;background:rgba(255,255,255,.68);color:#4c7180;box-shadow:inset 0 1px 0 rgba(255,255,255,.78)}
.pickerYearChoices,.pickerMonthChoices{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px}
.pickerMonthChoices{margin-top:14px}
.pickerYearChoices button,.pickerMonthChoices button{padding:10px 6px;border-radius:12px;background:rgba(240,250,252,.62);color:#416879;box-shadow:inset 0 1px 0 rgba(255,255,255,.78)}
.pickerYearChoices button.selected,.pickerMonthChoices button.selected{background:rgba(143,202,214,.36);color:#244a5d}
.pickerYearChoices button.current{border:1px solid rgba(106,174,190,.46)}
.recordDateInput{height:48px;padding:13px 14px;border-radius:16px;font-size:16px;line-height:normal;appearance:none;-webkit-appearance:none}
#mask,#deleteMask,#budgetMask{z-index:1200!important;padding:0 18px;-webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px)}
#mask>div,#deleteMask>div,#budgetMask>div{
background:rgba(255,255,255,.78)!important;
border:1px solid rgba(255,255,255,.82);
box-shadow:0 22px 48px rgba(49,86,103,.22);
-webkit-backdrop-filter:blur(18px) saturate(135%);
backdrop-filter:blur(18px) saturate(135%);
}
#saveEdit,#cancelEdit,#cancelDelete,#confirmDelete{margin-top:8px}
#cancelEdit,#cancelDelete{background:rgba(255,255,255,.7);color:#4c7180}
#confirmDelete{background:linear-gradient(180deg,#d9959b,#c6757e)}
.budgetModalActions{display:flex;gap:10px;margin-top:2px}
.budgetModalActions button{margin:0}
#cancelBudgetBtn{background:rgba(255,255,255,.7);color:#4c7180;box-shadow:inset 0 1px 0 rgba(255,255,255,.78)}
#saveBudgetBtn{box-shadow:0 8px 18px rgba(83,153,171,.2)}
.editDateInput{width:min(100%,180px)!important}
@media (max-width:520px){
.wrap{padding-left:14px;padding-right:14px}
.card{border-radius:22px;padding:18px}
.item{padding-right:82px}
h2{font-size:23px}
.summaryAmount{font-size:16px}
.budgetValue{font-size:15px}
.recentItem{padding:10px 12px}
.recentAmount{font-size:16px}
.fullLedgerView{padding-left:14px;padding-right:14px}
.fullLedgerHeader h2{font-size:20px}
.calendarWeekdays,.calendarGrid{gap:3px}
.calendarDay{border-radius:10px}
.calendarToolbar button{padding:8px 9px;font-size:14px}
.calendarMonthTitle{font-size:16px}
.calendarTodayBtn{padding:7px!important;font-size:12px}
.calendarPickerMask{padding:14px}
}
</style>
</head>
<body>
<div class="wrap">
<div class="card">
<h2>我们的小账本 · v1.3.2</h2>
<p class="small">Foundation：本地保存已完成（LocalStorage）</p>

<div class="monthlySummary">
<div class="summaryHeader"><div class="summaryTitle">🌊 本月小结</div><button class="summaryStatistics" id="viewStatisticsBtn" title="查看统计" aria-label="查看统计">📊</button></div>
<div class="summaryGrid">
<div class="summaryItem"><span class="summaryLabel">收入</span><strong class="summaryAmount income" id="monthlyIncome">+ ¥0</strong></div>
<div class="summaryItem"><span class="summaryLabel">支出</span><strong class="summaryAmount" id="monthlyExpense">- ¥0</strong></div>
<div class="summaryItem"><span class="summaryLabel">结余</span><strong class="summaryAmount" id="monthlyBalance">¥0</strong></div>
</div>
</div>

<div class="monthlyBudget">
<div class="budgetHeader"><span class="budgetTitle">🌱 本月预算</span><button class="budgetSettings" id="openBudgetSettings" title="设置本月预算" aria-label="设置本月预算">⚙️</button></div>
<div class="budgetGrid">
<div><span class="budgetLabel">预算</span><strong class="budgetValue" id="budgetAmountValue">暂未设置</strong></div>
<div><span class="budgetLabel">今日建议</span><strong class="budgetValue" id="budgetDailyValue">--</strong></div>
</div>
<div class="budgetProgressRow"><div class="budgetProgressTrack"><div class="budgetProgressBar" id="budgetProgressBar"></div></div><span class="budgetProgressText" id="budgetProgressText">--</span></div>
<div class="budgetHint" id="budgetHint"></div>
</div>

<div class="recentSection">
<h3>最近记录</h3>
<div class="recentList" id="recentList"></div>
</div>

<button class="viewLedgerBtn" id="viewLedgerBtn">📖 查看完整账本</button>
<button class="viewLedgerBtn" id="viewCalendarBtn">📅 查看日历</button>

<label>金额</label>
<input id="amount" inputmode="decimal">

<label>📅 日期</label>
<input class="recordDateInput" id="recordDate" type="date">

<label>这笔钱是？</label>
<select id="type">
<option>💰 收入</option>
<option>💸 支出</option>
</select>

<label id="categoryLabel">来自哪里？</label>
<select id="category"></select>

<div id="subcategoryField">
<label>具体是什么？</label>
<select id="subcategory"></select>
</div>

<label>备注</label>
<textarea id="note"></textarea>

<button id="saveBtn">记录这一笔</button>

<div class="msg" id="ash">😽 欢迎回来，宝宝。</div>
</div>

</div>

<div class="fullLedgerView" id="fullLedgerView" style="display:none">
<div class="fullLedgerHeader">
<button class="backBtn" id="backToHome">← 返回</button>
<h2>📖 完整账本</h2>
</div>

<div class="fullLedgerList" id="fullLedgerList"></div>
</div>

<div class="fullLedgerView" id="statisticsView" style="display:none">
<div class="fullLedgerHeader">
<button class="backBtn" id="backFromStatistics">← 返回</button>
<h2>📊 统计</h2>
</div>
<div class="statisticsContent">
<section class="statisticsSection">
<div class="statisticsSectionHeader"><h3 id="expenseCompositionTitle">🌊 本月支出组成</h3><button class="statisticsPickerBtn" id="openStatisticsPicker" title="选择统计月份" aria-label="选择统计月份">📅</button></div>
<div id="expenseStatistics"></div>
</section>
<section class="statisticsSection">
<div class="statisticsSectionHeader"><h3 id="expenseTrendTitle">📈 消费趋势</h3><button class="statisticsMartyBtn" id="showTrendMartyPlaceholder" title="Marty 留言" aria-label="Marty 留言">📖</button></div>
<div class="statisticsMartyNotice" id="trendMartyNotice" style="display:none" aria-live="polite"></div>
<div class="statisticsTrendDetails" id="trendPointDetails" style="display:none" aria-live="polite"><span id="trendPointDate"></span><strong id="trendPointAmount"></strong></div>
<div id="expenseTrend"></div>
</section>
</div>

<div class="calendarPickerMask" id="statisticsPickerMask" style="display:none">
<div class="calendarPicker">
<div class="calendarPickerHeader"><h3>选择年月</h3><button class="calendarPickerClose" id="closeStatisticsPicker">×</button></div>
<div class="pickerYearToolbar"><button id="previousStatisticsPickerYear">‹</button><span id="statisticsPickerYearLabel"></span><button id="nextStatisticsPickerYear">›</button></div>
<div class="pickerYearChoices" id="statisticsYearChoices"></div>
<div class="pickerMonthChoices" id="statisticsMonthChoices"></div>
</div>
</div>
</div>

<div class="fullLedgerView" id="fullCalendarView" style="display:none">
<div class="fullLedgerHeader">
<button class="backBtn" id="backFromCalendar">← 返回</button>
<h2>📅 日历</h2>
</div>
<div class="calendarContent">
<div class="calendarToolbar">
<button id="previousMonthBtn">‹ 上个月</button>

// 根据选中的支出分类更新具体项目选项，并默认选中第一个选项
// 输入参数：category，当前选中的支出分类文字；subcategorySelect，可选的具体项目下拉框
// 返回结果：无，直接更新具体项目下拉框
function updateSubcategoryOptions(category,subcategorySelect=document.getElementById("subcategory")){
 subcategorySelect.innerHTML="";
 (EXPENSE_CATEGORIES[category]||[]).forEach(subcategory=>{
   const option=document.createElement("option");
   option.value=subcategory;
   option.textContent=subcategory;
   subcategorySelect.appendChild(option);
 });
}

// 根据金额类型更新分类与具体项目控件
// 输入参数：type，当前选中的金额类型文字；其余参数为可选的目标控件
// 返回结果：无，直接更新分类选择框和具体项目区域
function updateCategoryOptions(
 type,
 categorySelect=document.getElementById("category"),
 subcategoryField=document.getElementById("subcategoryField"),
 categoryLabel=document.getElementById("categoryLabel"),
 subcategorySelect=document.getElementById("subcategory")
){
 const categories=type==="💰 收入"?INCOME_CATEGORIES:Object.keys(EXPENSE_CATEGORIES);
 categorySelect.innerHTML="";
 categories.forEach(category=>{
   const option=document.createElement("option");
   option.value=category;
   option.textContent=category;
   categorySelect.appendChild(option);
 });
 const isIncome=type==="💰 收入";
 categoryLabel.textContent=isIncome?"来自哪里？":"花在哪里？";
 subcategoryField.style.display=isIncome?"none":"block";
 if(!isIncome)updateSubcategoryOptions(categorySelect.value,subcategorySelect);
}

// 将新旧记录统一为金额类型、分类和具体项目，用于页面显示
// 输入参数：record，LocalStorage 中的一条账本记录
// 返回结果：包含 type、category、subcategory 的兼容分类对象
function getRecordClassification(record){
 if(record.type){
   return {type:record.type,category:record.category||"",subcategory:record.subcategory||""};
 }
 if(isIncomeCategory(record.category)){
   return {
     type:"💰 收入",
     category:record.category==="💰 收入"?(record.subcategory||"💰 其它"):record.category,
     subcategory:""
   };
 }
 return {type:"💸 支出",category:record.category||"📦 其它",subcategory:record.subcategory||""};
}

// 确保旧记录的分类值可以继续在编辑下拉框中被选中
// 输入参数：selectElement，目标下拉框；value，需要保留的分类文字
// 返回结果：无，必要时向下拉框补充旧分类选项
function ensureSelectValue(selectElement,value){
 if(!value||[...selectElement.options].some(option=>option.value===value))return;
 const option=document.createElement("option");
 option.value=value;
 option.textContent=value;
 selectElement.appendChild(option);
}

// 将一条记录的兼容分类填入编辑表单，并更新对应的分类控件
// 输入参数：record，需要编辑的账本记录
// 返回结果：无，直接更新编辑表单中的类型、分类和具体项目
function fillEditClassification(record){
 const classification=getRecordClassification(record);
 const editType=document.getElementById("eType");
 const editCategory=document.getElementById("eCategory");
 const editSubcategory=document.getElementById("eSubcategory");
 editType.value=classification.type;
 updateCategoryOptions(
   classification.type,
   editCategory,
   document.getElementById("eSubcategoryField"),
   document.getElementById("eCategoryLabel"),
   editSubcategory
 );
 ensureSelectValue(editCategory,classification.category);
 editCategory.value=classification.category;
 if(classification.type==="💸 支出"){
   updateSubcategoryOptions(editCategory.value,editSubcategory);
   ensureSelectValue(editSubcategory,classification.subcategory);
   editSubcategory.value=classification.subcategory||editSubcategory.value;
 }
}

// 判断分类或金额类型是否代表收入，兼容旧版收入分类
// 输入参数：category，记录中的分类或金额类型文字
// 返回结果：true 表示收入，false 表示支出
function isIncomeCategory(category){
 return category==="💰 收入"||category==="💼 收入"||INCOME_CATEGORIES.includes(category);
}

// 将金额格式化为：收入显示 +，支出显示 -，整数不显示小数，有小数时保留两位
// 输入参数：amount，记录中的金额；category，记录分类
// 返回结果：用于页面展示的金额字符串
function formatAmount(amount,category){
 const value=Number(amount)||0;
 const prefix=isIncomeCategory(category)?"+ ¥":"- ¥";
 return prefix+(Number.isInteger(value)?value:value.toFixed(2));
}

// 将记录时间转换为 Date，兼容旧版 LocalStorage 中保存的时间字符串
// 输入参数：time，记录中的时间字符串
// 返回结果：可用于格式化和分组的 Date 对象
function parseRecordTime(time){
 const timeText=String(time||"");
 const timeParts=timeText.match(/^(\d{4})[/-](\d{1,2})[/-](\d{1,2})\s+(\d{1,2}):(\d{1,2})(?::(\d{1,2}))?/);
 if(timeParts){
   return new Date(
     Number(timeParts[1]),
     Number(timeParts[2])-1,
     Number(timeParts[3]),
     Number(timeParts[4]),
     Number(timeParts[5]),
     Number(timeParts[6]||0)
   );
 }
 const recordDate=new Date(timeText);
 return Number.isNaN(recordDate.getTime())?new Date():recordDate;
}

// 将记录时间转换为原生日期输入框需要的 YYYY-MM-DD 格式
// 输入参数：time，记录中的时间字符串
// 返回结果：可直接填入 type="date" 输入框的日期字符串
function formatDateInput(time){
 const recordDate=parseRecordTime(time);
 return recordDate.getFullYear()+"-"+String(recordDate.getMonth()+1).padStart(2,"0")+"-"+String(recordDate.getDate()).padStart(2,"0");
}

// 更新记录日期并使用当前保存时间，维持 time 字段为字符串
// 输入参数：dateValue，YYYY-MM-DD 格式的新日期
// 返回结果：包含新日期和当前时分秒的时间字符串
function updateRecordDate(dateValue){
 const dateParts=dateValue.split("-").map(Number);
 const now=new Date();
 const updatedDate=new Date(
   dateParts[0],
   dateParts[1]-1,
   dateParts[2],
   now.getHours(),
   now.getMinutes(),
   now.getSeconds()
 );
 return updatedDate.toLocaleString();
}

// 将时间格式化为：20:36 / 昨天 20:36 / 7 月 3 日 / 2025/12/18
// 输入参数：time，记录中的时间字符串
// 返回结果：用于记录卡片展示的时间文字
function formatRecordTime(time){
 const recordDate=parseRecordTime(time);
 const now=new Date();
 const todayStart=new Date(now.getFullYear(),now.getMonth(),now.getDate());
 const recordStart=new Date(recordDate.getFullYear(),recordDate.getMonth(),recordDate.getDate());
 const dayDiff=Math.round((todayStart-recordStart)/86400000);
 const hours=String(recordDate.getHours()).padStart(2,"0");
 const minutes=String(recordDate.getMinutes()).padStart(2,"0");
 if(dayDiff===0)return hours+":"+minutes;
 if(dayDiff===1)return "昨天 "+hours+":"+minutes;
 if(recordDate.getFullYear()===now.getFullYear())return (recordDate.getMonth()+1)+" 月 "+recordDate.getDate()+" 日";
 return recordDate.getFullYear()+"/"+String(recordDate.getMonth()+1).padStart(2,"0")+"/"+String(recordDate.getDate()).padStart(2,"0");
}

// 将 Date 对象格式化为日历比较使用的 YYYY-MM-DD 日期键
// 输入参数：date，需要格式化的 Date 对象
// 返回结果：用于日历标记和当天记录筛选的日期字符串
function formatCalendarDateKey(date){
 return date.getFullYear()+"-"+String(date.getMonth()+1).padStart(2,"0")+"-"+String(date.getDate()).padStart(2,"0");
}

// 获取指定日期的记录，并保持从新到旧的顺序
// 输入参数：records，账本记录数组；dateKey，YYYY-MM-DD 格式的日期键
// 返回结果：指定日期的记录数组
function getRecordsForCalendarDate(records,dateKey){
 return sortRecordsByNewest(records.filter(record=>formatCalendarDateKey(parseRecordTime(record.time))===dateKey));
}

// 计算指定记录集合的收入、支出与结余
// 输入参数：records，需要汇总的账本记录数组
// 返回结果：包含 income、expense、balance 的汇总对象
function calculateRecordSummary(records){
 const summary={income:0,expense:0,balance:0};
 records.forEach(record=>{
   const amount=Number(record.amount)||0;
   if(isIncomeCategory(getRecordClassification(record).type))summary.income+=amount;
   else summary.expense+=amount;
 });
 summary.balance=summary.income-summary.expense;
 return summary;
}

// 将日期键格式化为日历当天记录区域的标题
// 输入参数：dateKey，YYYY-MM-DD 格式的日期键
// 返回结果：例如“📅 2026年7月11日”的标题文字
function formatCalendarDateTitle(dateKey){
 const dateParts=dateKey.split("-").map(Number);
 return "📅 "+dateParts[0]+"年"+dateParts[1]+"月"+dateParts[2]+"日";
}

// 渲染当前查看月份的星期标题、日期网格与账单标记
// 输入参数：无，使用当前 calendarMonthDate、selectedCalendarDate 和 ledger 数据
// 返回结果：无，直接更新日历日期网格
function renderCalendarMonth(){
 const calendarGrid=document.getElementById("calendarGrid");
 const monthTitle=document.getElementById("calendarMonthTitle");
 const year=calendarMonthDate.getFullYear();
 const month=calendarMonthDate.getMonth();
 const now=new Date();
 const calendarBudgetStatus=year===now.getFullYear()&&month===now.getMonth()?calculateMonthlyBudgetStatus():{hasBudget:false};
 const firstDay=new Date(year,month,1).getDay();
 const daysInMonth=new Date(year,month+1,0).getDate();
 const recordDates=new Set(ledger.map(record=>formatCalendarDateKey(parseRecordTime(record.time))));
 monthTitle.textContent=year+"年"+(month+1)+"月";
 calendarGrid.innerHTML="";
 for(let dayIndex=0;dayIndex<firstDay;dayIndex++){
   const emptyDay=document.createElement("div");
   emptyDay.className="calendarDay empty";
   calendarGrid.appendChild(emptyDay);
 }
 for(let day=1;day<=daysInMonth;day++){
   const dateKey=formatCalendarDateKey(new Date(year,month,day));
   const hasRecords=recordDates.has(dateKey);
   const dayButton=document.createElement("button");
   dayButton.type="button";
   dayButton.className="calendarDay"+(hasRecords?" hasRecords":"")+(hasRecords?getCalendarBudgetClass(dateKey,calendarBudgetStatus):"")+(dateKey===selectedCalendarDate?" selected":"");
   dayButton.innerHTML=`<span class="calendarDayNumber">${day}</span>${hasRecords?"<span class='calendarDot'></span>":""}`;
   dayButton.onclick=()=>{
     selectedCalendarDate=dateKey;
     renderCalendar();
   };
   calendarGrid.appendChild(dayButton);
 }
}

// 渲染已选日期的当天小结和记录列表
// 输入参数：无，使用当前 selectedCalendarDate 和 ledger 数据
// 返回结果：无，直接更新当天记录区域
function renderCalendarDayDetails(){
 const dayRecords=getRecordsForCalendarDate(ledger,selectedCalendarDate);
 const daySummary=calculateRecordSummary(dayRecords);
 const dailySummary=document.getElementById("dailySummary");
 const dayList=document.getElementById("calendarDayList");
 document.getElementById("calendarSelectedDate").textContent=formatCalendarDateTitle(selectedCalendarDate);
 dailySummary.innerHTML=`<span>收入<strong class="income">${formatAmount(daySummary.income,"💰 收入")}</strong></span><span>支出<strong>${formatAmount(daySummary.expense,"💸 支出")}</strong></span>`;
 dayList.innerHTML="";
 if(!dayRecords.length){dayList.innerHTML="<div class='small'>暂无记录。</div>";return;}
 dayRecords.forEach(record=>{
   const classification=getRecordClassification(record);
   const label=classification.subcategory?classification.subcategory+" · "+classification.category:classification.category;
   const row=document.createElement("div");
   const amountClass=isIncomeCategory(classification.type)?"calendarRecordAmount income":"calendarRecordAmount";
   row.className="calendarRecord";
   row.innerHTML=`<span class="calendarRecordLabel">${label}</span><span class="${amountClass}">${formatAmount(record.amount,classification.type)}</span>`;
   dayList.appendChild(row);
 });
}

// 输入参数：无，使用日历当前状态和 ledger 数据

// 渲染可复用的年月选择器年份网格与月份选项
// 输入参数：pickerOptions，包含选择器元素 ID、当前年月和选择回调的配置对象
// 返回结果：无，直接更新对应选择器中的年份与月份按钮
function renderMonthPickerOptions(pickerOptions){
 const yearChoices=document.getElementById(pickerOptions.yearChoicesId);
 const monthChoices=document.getElementById(pickerOptions.monthChoicesId);
 const currentYear=new Date().getFullYear();
 document.getElementById(pickerOptions.yearLabelId).textContent=pickerOptions.pickerStartYear+" - "+(pickerOptions.pickerStartYear+5);
 yearChoices.innerHTML="";
 monthChoices.innerHTML="";
 for(let year=pickerOptions.pickerStartYear;year<pickerOptions.pickerStartYear+6;year++){
   const yearButton=document.createElement("button");
   yearButton.type="button";
   yearButton.textContent=year;
   yearButton.className=(year===pickerOptions.pickerYear?"selected ":"")+(year===currentYear?"current":"");
   yearButton.onclick=()=>pickerOptions.onSelectYear(year);
   yearChoices.appendChild(yearButton);
 }
 for(let month=0;month<12;month++){
   const monthButton=document.createElement("button");
   monthButton.type="button";
   monthButton.textContent=(month+1)+"月";
   monthButton.className=pickerOptions.currentMonthDate.getFullYear()===pickerOptions.pickerYear&&pickerOptions.currentMonthDate.getMonth()===month?"selected":"";
   monthButton.onclick=()=>pickerOptions.onSelectMonth(month);
   monthChoices.appendChild(monthButton);
 }
}

// 将记录时间格式化为分组标题：今天 / 昨天 / 7 月 3 日 / 2025/12/18
// 输入参数：time，记录中的时间字符串
// 返回结果：用于账本分组标题的文字
function formatGroupTitle(time){
 const recordDate=parseRecordTime(time);
 const now=new Date();
 const todayStart=new Date(now.getFullYear(),now.getMonth(),now.getDate());
 const recordStart=new Date(recordDate.getFullYear(),recordDate.getMonth(),recordDate.getDate());
 const dayDiff=Math.round((todayStart-recordStart)/86400000);
 if(dayDiff===0)return "今天";
 if(dayDiff===1)return "昨天";
 if(recordDate.getFullYear()===now.getFullYear())return (recordDate.getMonth()+1)+" 月 "+recordDate.getDate()+" 日";
 return recordDate.getFullYear()+"/"+String(recordDate.getMonth()+1).padStart(2,"0")+"/"+String(recordDate.getDate()).padStart(2,"0");
}

// 将账本记录按时间从新到旧排序
// 输入参数：records，账本记录数组
// 返回结果：按记录时间从新到旧排列的新数组
function sortRecordsByNewest(records){
 return [...records].sort((firstRecord,secondRecord)=>parseRecordTime(secondRecord.time)-parseRecordTime(firstRecord.time));
}

// 按日期将账本记录分组，保持记录从新到旧展示
// 输入参数：records，账本记录数组
// 返回结果：包含标题和记录列表的分组数组
function groupLedgerByDate(records){
 const groupedLedger=[];
 sortRecordsByNewest(records).forEach(record=>{
   const title=formatGroupTitle(record.time);
   let currentGroup=groupedLedger.find(group=>group.title===title);
   if(!currentGroup){
     currentGroup={title:title,records:[]};
     groupedLedger.push(currentGroup);
   }
   currentGroup.records.push(record);
 });
 return groupedLedger;
}

// 获取首页需要展示的最近记录
// 输入参数：records，账本记录数组
// 返回结果：最多包含三条最新记录的数组
function getRecentRecords(records){
 return sortRecordsByNewest(records).slice(0,3);
}

// 计算当前自然月的收入、支出和结余，兼容没有 type 字段的旧记录
// 输入参数：无，使用当前 ledger 数据和系统当前日期
// 返回结果：包含 income、expense、balance 的本月汇总对象
function calculateMonthlySummary(){
 const now=new Date();
 const monthlySummary={income:0,expense:0,balance:0};
 ledger.forEach(record=>{
   const recordDate=parseRecordTime(record.time);
   if(recordDate.getFullYear()!==now.getFullYear()||recordDate.getMonth()!==now.getMonth())return;
   const amount=Number(record.amount)||0;
   if(isIncomeCategory(getRecordClassification(record).type))monthlySummary.income+=amount;
   else monthlySummary.expense+=amount;
 });
 monthlySummary.balance=monthlySummary.income-monthlySummary.expense;
 return monthlySummary;
}

const STATISTICS_CATEGORY_COLORS={
 "🍜 吃饭":"#d99a62",
 "🛍️ 购物":"#6d9fc4",
 "🚗 出行":"#79ad8c",
 "🏠 住房":"#9b8bc0",
 "📚 教育":"#c9aa55",
 "🎮 娱乐":"#d8847b",
 "🎁 人情":"#d39ab5",
 "🏥 医疗":"#69adbc",
 "📦 其它":"#98a3a8"
};

// 返回指定支出一级分类的固定统计颜色
// 输入参数：category，支出一级分类文字
// 返回结果：分类固定颜色值，未匹配的历史分类使用中性灰
function getStatisticsCategoryColor(category){
 return STATISTICS_CATEGORY_COLORS[category]||"#98a3a8";
}

// 汇总当前统计月份各支出一级分类的金额，兼容没有 type 字段的旧记录
// 输入参数：无，使用当前 ledger 数据和 statisticsMonthDate 状态
// 返回结果：按金额从高到低排列的分类金额数组
function calculateMonthlyExpenseCategories(){
 const categoryAmounts={};
 ledger.forEach(record=>{
   const recordDate=parseRecordTime(record.time);
   if(recordDate.getFullYear()!==statisticsMonthDate.getFullYear()||recordDate.getMonth()!==statisticsMonthDate.getMonth())return;
   const classification=getRecordClassification(record);
   if(isIncomeCategory(classification.type))return;
   const category=classification.category||"📦 其它";
   categoryAmounts[category]=(categoryAmounts[category]||0)+(Number(record.amount)||0);
 });
 return Object.entries(categoryAmounts)
   .map(([category,amount])=>({category:category,amount:amount}))
   .sort((firstCategory,secondCategory)=>secondCategory.amount-firstCategory.amount);
}

// 汇总当前统计月份每天的支出金额，未产生支出的日期保留为 0
// 输入参数：无，使用当前 ledger 数据和 statisticsMonthDate 状态
// 返回结果：统计月份每日支出金额数组，索引 0 对应当月 1 日
function calculateMonthlyDailyExpenses(){
 const daysInMonth=new Date(statisticsMonthDate.getFullYear(),statisticsMonthDate.getMonth()+1,0).getDate();
 const dailyExpenses=Array(daysInMonth).fill(0);
 ledger.forEach(record=>{
   const recordDate=parseRecordTime(record.time);
   if(recordDate.getFullYear()!==statisticsMonthDate.getFullYear()||recordDate.getMonth()!==statisticsMonthDate.getMonth())return;
   if(isIncomeCategory(getRecordClassification(record).type))return;
   dailyExpenses[recordDate.getDate()-1]+=Number(record.amount)||0;
 });
 return dailyExpenses;
}

 document.getElementById("expenseTrendTitle").textContent=`📈 ${currentMonth}月消费趋势`;
}

// 返回消费趋势图需要展示的简洁日期刻度
// 输入参数：daysInMonth，当前月的总天数
// 返回结果：去重后的日期刻度数组
function getTrendLabelDays(daysInMonth){
 return [...new Set([1,7,14,21,28,daysInMonth].filter(day=>day<=daysInMonth))];
}

// 计算趋势折线图中每个日期的 SVG 坐标
// 输入参数：dailyExpenses，每日支出金额数组；chartWidth、chartHeight，SVG 画布尺寸
// 返回结果：包含坐标、基线和绘图区尺寸的趋势图坐标对象
function createTrendChartCoordinates(dailyExpenses,chartWidth,chartHeight){
 const chartPadding={left:8,right:8,top:12,bottom:28};
 const maximumExpense=Math.max(...dailyExpenses,1);
 const plotWidth=chartWidth-chartPadding.left-chartPadding.right;
 const plotHeight=chartHeight-chartPadding.top-chartPadding.bottom;
 const points=dailyExpenses.map((amount,index)=>({
   x:chartPadding.left+plotWidth*index/(dailyExpenses.length-1),
   y:chartPadding.top+plotHeight*(1-amount/maximumExpense)
 }));
 return {points:points,baseY:chartHeight-chartPadding.bottom,chartPadding:chartPadding};
}

// 根据已选择的趋势日期显示对应的日期与支出金额
// 输入参数：dailyExpenses，统计月份每日支出金额数组
// 返回结果：无，直接更新趋势图上方的数据点信息区域
function renderTrendPointDetails(dailyExpenses){
 const details=document.getElementById("trendPointDetails");
 if(!selectedTrendDay||selectedTrendDay>dailyExpenses.length){
   details.style.display="none";
   return;
 }
 const currentMonth=statisticsMonthDate.getMonth()+1;
 document.getElementById("trendPointDate").textContent=`${currentMonth}月${selectedTrendDay}日`;
 document.getElementById("trendPointAmount").textContent=`支出 ${formatBudgetAmount(dailyExpenses[selectedTrendDay-1])}`;
 details.style.display="flex";
}

// 创建带日期标签的消费趋势 SVG 折线图
// 输入参数：dailyExpenses，当前月每日支出金额数组
// 返回结果：可直接插入页面的 SVG 图表元素
function createExpenseTrendSvg(dailyExpenses){
 const chartWidth=320;
 const chartHeight=154;
 const coordinates=createTrendChartCoordinates(dailyExpenses,chartWidth,chartHeight);
 const svgNamespace="http://www.w3.org/2000/svg";
 const createSvgElement=(elementName,attributes)=>{
   const element=document.createElementNS(svgNamespace,elementName);
   Object.entries(attributes).forEach(([attributeName,attributeValue])=>element.setAttribute(attributeName,attributeValue));
   return element;
 };
 const svg=createSvgElement("svg",{viewBox:`0 0 ${chartWidth} ${chartHeight}`,role:"img","aria-label":"本月每日支出趋势"});
 const pointText=coordinates.points.map(point=>`${point.x},${point.y}`).join(" ");
 const firstPoint=coordinates.points[0];
 const lastPoint=coordinates.points[coordinates.points.length-1];
 const baseline=createSvgElement("line",{x1:coordinates.chartPadding.left,y1:coordinates.baseY,x2:chartWidth-coordinates.chartPadding.right,y2:coordinates.baseY,class:"statisticsTrendBaseline"});
 const area=createSvgElement("path",{d:`M ${firstPoint.x} ${coordinates.baseY} L ${pointText} L ${lastPoint.x} ${coordinates.baseY} Z`,class:"statisticsTrendArea"});
 const line=createSvgElement("polyline",{points:pointText,class:"statisticsTrendLine"});
 svg.append(baseline,area,line);
 if(selectedTrendDay&&coordinates.points[selectedTrendDay-1]){
   const selectedPoint=coordinates.points[selectedTrendDay-1];
   svg.appendChild(createSvgElement("circle",{cx:selectedPoint.x,cy:selectedPoint.y,r:4.5,fill:"#f8feff",stroke:"#69b7c8","stroke-width":2}));
 }
 dailyExpenses.forEach((amount,index)=>{
   const point=coordinates.points[index];
   const touchTarget=createSvgElement("circle",{cx:point.x,cy:point.y,r:6,fill:"#ffffff","fill-opacity":0});
   touchTarget.setAttribute("tabindex","0");
   touchTarget.setAttribute("role","button");
   touchTarget.setAttribute("aria-label",`查看${index+1}日支出`);
   touchTarget.addEventListener("click",()=>{
     selectedTrendDay=index+1;
     renderExpenseTrend();
   });
   touchTarget.addEventListener("keydown",event=>{
     if(event.key!=="Enter"&&event.key!==" ")return;
     event.preventDefault();
     selectedTrendDay=index+1;
     renderExpenseTrend();
   });
   svg.appendChild(touchTarget);
 });
 getTrendLabelDays(dailyExpenses.length).forEach(day=>{
   const point=coordinates.points[day-1];
   const textAnchor=day===1?"start":day===dailyExpenses.length?"end":"middle";
   const label=createSvgElement("text",{x:point.x,y:chartHeight-7,"text-anchor":textAnchor,class:"statisticsTrendLabel"});
   label.textContent=`${day}日`;
   svg.appendChild(label);
 });
 return svg;
}

// 渲染本月消费趋势图或无支出提示
// 输入参数：无，使用当前 ledger 数据
// 返回结果：无，直接更新 Statistics 页面中的趋势区域
function renderExpenseTrend(){

// 根据分类金额生成圆环图所需的 conic-gradient 颜色区间
// 输入参数：categories，按金额排序的分类金额数组；totalAmount，全部分类金额总和
// 返回结果：用于 CSS background 的颜色区间字符串
function buildExpenseDonutGradient(categories,totalAmount){
 let currentPercent=0;
 return categories.map(category=>{
   const startPercent=currentPercent;
   currentPercent+=category.amount/totalAmount*100;
   const color=getStatisticsCategoryColor(category.category);
   return `${color} ${startPercent}% ${currentPercent}%`;
 }).join(",");
}

   return;
 }
 const donut=document.createElement("div");
 donut.className="statisticsDonut";
 donut.style.background=`conic-gradient(${buildExpenseDonutGradient(categories,totalAmount)})`;

 const categoryList=document.createElement("div");

// 读取所有已保存的月度预算，兼容早期单条预算对象
// 输入参数：无，从 LocalStorage 读取预算数据
// 返回结果：包含 { year, month, amount } 的预算数组
function loadBudgets(){
 try{
   const storedBudget=JSON.parse(localStorage.getItem(BUDGET_KEY)||"[]");
   if(Array.isArray(storedBudget))return storedBudget;
   return storedBudget&&typeof storedBudget==="object"?[storedBudget]:[];
 }catch(error){
   return [];
 }
}

// 保存所有月度预算到独立的 LocalStorage key
// 输入参数：无，使用当前 budgets 数组
// 返回结果：无，直接更新 LocalStorage 中的预算数据
function saveBudgets(){
 localStorage.setItem(BUDGET_KEY,JSON.stringify(budgets));
}

// 获取指定年月的预算记录
// 输入参数：year，年份；month，1 到 12 的月份
// 返回结果：对应月份的预算对象，未设置时返回 undefined
function getBudgetForMonth(year,month){
 return budgets.find(budget=>Number(budget.year)===year&&Number(budget.month)===month);
}

// 格式化预算金额，整数不显示小数并保留负数状态
// 输入参数：amount，需要显示的预算金额
// 返回结果：用于预算卡片展示的金额字符串
function formatBudgetAmount(amount){
 const value=Number(amount)||0;
 const displayValue=Number.isInteger(Math.abs(value))?Math.abs(value):Math.abs(value).toFixed(2);
 return (value<0?"- ¥":"¥")+displayValue;
}

// 计算当前自然月预算的支出、剩余金额与每日建议额度
// 输入参数：无，使用当前系统日期、当前月预算与账本记录
// 返回结果：包含预算状态和计算结果的对象
function calculateMonthlyBudgetStatus(){
 const now=new Date();
 const year=now.getFullYear();
 const month=now.getMonth()+1;
 const budget=getBudgetForMonth(year,month);
 if(!budget)return {hasBudget:false,year:year,month:month};
 const spent=calculateMonthlySummary().expense;
 const remaining=Number(budget.amount)-spent;
 const daysInMonth=new Date(year,month,0).getDate();
 const remainingDays=daysInMonth-now.getDate()+1;
 return {
   hasBudget:true,
   year:year,
   month:month,
   amount:Number(budget.amount),
   spent:spent,
   remaining:remaining,
   dailySuggestion:remaining/remainingDays
 };
}

// 返回与预算状态对应的温暖提示文字
// 输入参数：budgetStatus，由 calculateMonthlyBudgetStatus 返回的预算状态
// 返回结果：预算卡片中展示的提示文字
function getBudgetHint(budgetStatus){
 if(!budgetStatus.hasBudget)return "设置一个小目标，从今天开始慢慢来。";
 if(budgetStatus.remaining<0)return "没关系，我们还有下个月 🌊";
 if(budgetStatus.spent/budgetStatus.amount>=0.8)return "最近花销稍微靠近计划啦 🌱";
 return "今天也可以安心生活 🤍";
}

// 渲染首页本月预算卡片中的金额和状态提示
// 输入参数：无，使用当前月预算状态
// 返回结果：无，直接更新预算卡片内容
function renderBudget(){
 const budgetStatus=calculateMonthlyBudgetStatus();
 const budgetAmountElement=document.getElementById("budgetAmountValue");
 const dailyElement=document.getElementById("budgetDailyValue");
 const progressBar=document.getElementById("budgetProgressBar");
 const progressText=document.getElementById("budgetProgressText");
 if(!budgetStatus.hasBudget){
   budgetAmountElement.textContent="暂未设置预算";
   dailyElement.textContent="--";
   progressBar.style.width="0%";
   progressBar.className="budgetProgressBar";
   progressText.textContent="--";
 }else{
   budgetAmountElement.textContent=formatBudgetAmount(budgetStatus.amount);
   dailyElement.textContent=formatBudgetAmount(budgetStatus.dailySuggestion);
   const usagePercent=budgetStatus.amount===0?(budgetStatus.spent>0?100:0):budgetStatus.spent/budgetStatus.amount*100;
   progressBar.style.width=Math.min(usagePercent,100)+"%";
   progressBar.className="budgetProgressBar"+(usagePercent>100?" over":"");
   progressText.textContent=Math.round(usagePercent)+"%";
 }
 document.getElementById("budgetHint").textContent=getBudgetHint(budgetStatus);
}

// 保存当前自然月的预算金额，存在时更新，不存在时新增
// 输入参数：amount，需要保存的预算金额
// 返回结果：无，更新 budgets 数组并保存到 LocalStorage
function saveCurrentMonthBudget(amount){
 const now=new Date();
 const year=now.getFullYear();
 const month=now.getMonth()+1;
 const existingBudget=getBudgetForMonth(year,month);
 if(existingBudget)existingBudget.amount=amount;
 else budgets.push({year:year,month:month,amount:amount});
 saveBudgets();
}

// 根据当前预算的每日建议额度返回日历日期状态类
// 输入参数：dateKey，YYYY-MM-DD 日期键；budgetStatus，当前月预算状态
// 返回结果：日历日期使用的预算状态 class，未设置预算时返回空字符串
function getCalendarBudgetClass(dateKey,budgetStatus){
 if(!budgetStatus.hasBudget)return "";
 const dayRecords=getRecordsForCalendarDate(ledger,dateKey);
 const dayExpense=calculateRecordSummary(dayRecords).expense;
 if(dayExpense===0)return " withinBudget";
 return dayExpense>budgetStatus.dailySuggestion?" overBudget":" withinBudget";
}

// 将结余格式化为带正负号的金额，零结余不显示正负号
// 输入参数：balance，本月收入减支出的结余数值
// 返回结果：用于本月小结展示的结余金额字符串
function formatBalanceAmount(balance){
 if(balance===0)return "¥0";
 return formatAmount(Math.abs(balance),balance>0?"💰 收入":"💸 支出");
}

// 将本月汇总结果显示在本月小结区域
// 输入参数：无，使用 calculateMonthlySummary 的计算结果
// 返回结果：无，直接更新本月小结中的金额文字和颜色

// 将指定记录渲染为按日期分组的账本卡片
// 输入参数：records，需要展示的记录数组；container，承载记录的页面元素
// 返回结果：无，直接更新指定容器内容
function renderRecordList(records,container){
 container.innerHTML="";
 if(!records.length){container.innerHTML="<div class='small'>暂无记录。</div>";return;}
 groupLedgerByDate(records).forEach(group=>{
   const groupElement=document.createElement("div");
   groupElement.className="dateGroup";
   groupElement.innerHTML=`<div class="dateTitle">${group.title}</div>`;
   group.records.forEach(item=>{
   const row=document.createElement("div");
   row.className="item";
   const classification=getRecordClassification(item);
   const amountClass=isIncomeCategory(classification.type)?"amount income":"amount";
   const category="<span class='subcategory'>"+classification.category+"</span>";
   const subcategory=classification.subcategory?"<span class='subcategory'>"+classification.subcategory+"</span>":"";
   row.innerHTML=`<b>${classification.type}</b>${category}${subcategory}<span class="${amountClass}">${formatAmount(item.amount,classification.type)}</span><span class='small record-time'>${formatRecordTime(item.time)}</span>${item.note?"<span class='small record-note'>"+item.note+"</span>":""}`;
   const actions=document.createElement("div");
   actions.className="actions";
   const eb=document.createElement("button");
   eb.className="iconBtn";
   eb.textContent="✎";
   eb.title="编辑";
   eb.setAttribute("aria-label","编辑");
   eb.onclick=()=>openEdit(item.id);
   const db=document.createElement("button");
   db.className="iconBtn delete";
   db.textContent="×";
   db.title="删除";
   db.setAttribute("aria-label","删除");
   db.onclick=()=>removeItem(item.id);
   actions.appendChild(eb); actions.appendChild(db);
   row.appendChild(actions);
   groupElement.appendChild(row);
   });
   container.appendChild(groupElement);
 });
}

// 将最近记录渲染为首页使用的紧凑两行样式
// 输入参数：records，需要展示的最近记录数组；container，承载记录的页面元素
// 返回结果：无，直接更新首页最近记录区域
function renderRecentRecords(records,container){
 container.innerHTML="";
 if(!records.length){container.innerHTML="<div class='small'>暂无记录。</div>";return;}
 records.forEach(item=>{
   const classification=getRecordClassification(item);
   const label=classification.subcategory?
     classification.subcategory+" · "+classification.category:
     classification.category+" · "+classification.type;
   const row=document.createElement("div");
   row.className="recentItem";
   const amountClass=isIncomeCategory(classification.type)?"recentAmount income":"recentAmount";
   row.innerHTML=`<div class="recentMain"><span class="recentLabel">${label}</span><span class="${amountClass}">${formatAmount(item.amount,classification.type)}</span></div><span class="recentTime">${formatRecordTime(item.time)}</span>`;
   container.appendChild(row);
 });
}

function openEdit(id){
 editingId=id;
 const it=ledger.find(x=>x.id===id);
 document.getElementById("eDate").value=formatDateInput(it.time);
 document.getElementById("eAmount").value=it.amount;
 fillEditClassification(it);
 document.getElementById("eNote").value=it.note||"";
 document.getElementById("mask").style.display="block";
}
document.getElementById("cancelEdit").onclick=()=>mask.style.display="none";
document.getElementById("saveEdit").onclick=()=>{
 const it=ledger.find(x=>x.id===editingId);
 const editedDate=document.getElementById("eDate").value;
 const originalDate=formatDateInput(it.time);
 it.amount=parseFloat(document.getElementById("eAmount").value)||0;
 it.type=document.getElementById("eType").value;
 it.category=document.getElementById("eCategory").value;
 it.subcategory=it.type==="💸 支出"?document.getElementById("eSubcategory").value:"";
 it.note=document.getElementById("eNote").value;
 if(editedDate&&editedDate!==originalDate)it.time=updateRecordDate(editedDate);
 save(); render();
 document.getElementById("ash").textContent="✓ 已修改";
 mask.style.display="none";
};
document.getElementById("eType").onchange=event=>updateCategoryOptions(
 event.target.value,
 document.getElementById("eCategory"),
 document.getElementById("eSubcategoryField"),
 document.getElementById("eCategoryLabel"),
 document.getElementById("eSubcategory")
);
document.getElementById("eCategory").onchange=event=>updateSubcategoryOptions(
 event.target.value,
 document.getElementById("eSubcategory")
);
let deletingId=null;
function removeItem(id){
 deletingId=id;
 document.getElementById("deleteMask").style.display="block";
}
document.addEventListener("DOMContentLoaded",()=>{
 document.getElementById("cancelDelete").onclick=()=>document.getElementById("deleteMask").style.display="none";
 document.getElementById("confirmDelete").onclick=()=>{
   ledger=ledger.filter(x=>x.id!==deletingId);
   save(); render();
   document.getElementById("ash").textContent="🤍 这一笔已经从我们的小账本里拿出来了。";
   document.getElementById("deleteMask").style.display="none";
 };
});

document.getElementById("saveBtn").onclick=()=>{
 const amountInput=document.getElementById("amount");
 const noteInput=document.getElementById("note");
 const recordDateInput=document.getElementById("recordDate");
 const typeSelect=document.getElementById("type");
 const categorySelect=document.getElementById("category");
 const subcategorySelect=document.getElementById("subcategory");
 const amount=amountInput.value.trim();
 const recordDate=recordDateInput.value||formatCalendarDateKey(new Date());
 if(!amount)return;
 ledger.push({
   id:crypto.randomUUID?crypto.randomUUID():String(Date.now()),
   amount:parseFloat(amount),
   type:typeSelect.value,
   category:categorySelect.value,
   subcategory:typeSelect.value==="💸 支出"?subcategorySelect.value:"",
   note:noteInput.value.trim(),
   time:updateRecordDate(recordDate)
 });
 document.getElementById("ash").textContent="📖 正在放进我们的小账本……";
 save();
 setTimeout(()=>{
   render();
   document.getElementById("ash").textContent=MSGS[Math.floor(Math.random()*MSGS.length)];
   amountInput.value="";
   noteInput.value="";
 },400);
};
document.getElementById("type").onchange=event=>updateCategoryOptions(event.target.value);
document.getElementById("category").onchange=event=>updateSubcategoryOptions(event.target.value);
document.getElementById("recordDate").value=formatCalendarDateKey(new Date());
updateCategoryOptions(document.getElementById("type").value);
render();
</script>
