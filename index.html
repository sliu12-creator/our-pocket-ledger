
<!DOCTYPE html>

<style>

#mask,#deleteMask{z-index:1200!important;padding:0 18px;-webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px)}

<body>
<div class="wrap">
<div class="card">
<h2>我们的小账本 · v1.0.0</h2>
<p class="small">Foundation：本地保存已完成（LocalStorage）</p>

<div class="monthlySummary">
<div class="summaryTitle">🌊 本月小结</div>
<div class="summaryGrid">
<div class="summaryItem"><span class="summaryLabel">收入</span><strong class="summaryAmount income" id="monthlyIncome">+ ¥0</strong></div>
<div class="summaryItem"><span class="summaryLabel">支出</span><strong class="summaryAmount" id="monthlyExpense">- ¥0</strong></div>

</div>
</div>

<div class="recentSection">

</div>

<button class="viewLedgerBtn" id="viewLedgerBtn">📖 查看完整账本</button>
<button class="viewLedgerBtn" id="viewCalendarBtn">📅 查看日历</button>

<label>金额</label>
<input id="amount" inputmode="decimal">

<label>这笔钱是？</label>
<select id="type">
<option>💰 收入</option>
<option>💸 支出</option>
</select>

<label id="categoryLabel">来自哪里？</label>
<select id="category"></select>

<div id="subcategoryField">
<label>具体是什么？</label>
<select id="subcategory"></select>
</div>

<label>备注</label>
<textarea id="note"></textarea>

<button id="saveBtn">记录这一笔</button>

<div class="msg" id="ash">😽 欢迎回来，宝宝。</div>
</div>

</div>

<div class="fullLedgerView" id="fullLedgerView" style="display:none">
<div class="fullLedgerHeader">
<button class="backBtn" id="backToHome">← 返回</button>
<h2>📖 完整账本</h2>
</div>

<div class="fullLedgerList" id="fullLedgerList"></div>
</div>

<div class="fullLedgerView" id="fullCalendarView" style="display:none">
<div class="fullLedgerHeader">
<button class="backBtn" id="backFromCalendar">← 返回</button>
<h2>📅 日历</h2>
</div>
<div class="calendarContent">
<div class="calendarToolbar">
<button id="previousMonthBtn">‹ 上个月</button>
<div class="calendarMonthTitle" id="calendarMonthTitle"></div>
<button id="nextMonthBtn">下个月 ›</button>
</div>
<div class="calendarWeekdays"><span>日</span><span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span></div>
<div class="calendarGrid" id="calendarGrid"></div>
<div class="calendarDaySummary">
<h3 id="calendarSelectedDate"></h3>
<div class="dailySummary" id="dailySummary"></div>
<div class="calendarDayList" id="calendarDayList"></div>
</div>
</div>
</div>


<script>
const KEY="ourLedger_v032";
const MSGS=[
"收到啦，这一笔我帮宝宝收好了。🤍",
"今天也一起认真生活。😽",
"谢谢你继续和我一起记录今天。"
];
let ledger=JSON.parse(localStorage.getItem(KEY)||"[]");
let editingId=null;
let calendarMonthDate=new Date(new Date().getFullYear(),new Date().getMonth(),1);
let selectedCalendarDate=formatCalendarDateKey(new Date());
const INCOME_CATEGORIES=["💼 工资","🧑‍💻 兼职","🧧 红包","↩️ 退款","📈 投资","♻️ 出二手","💰 其它"];
const EXPENSE_CATEGORIES={
 "🍜 吃饭":["🌅 早餐","🍱 中餐","🍽️ 晚餐","🍪 零食","🥬 买菜","🍎 水果","🌙 夜宵","🍜 其它"],
 "🛍️ 购物":["🧻 生活用品","👕 服装","👟 鞋子","💍 首饰","👜 包包","💄 护肤彩妆","🛍️ 其它"],
 "🚗 出行":["🚌 公交","🚇 地铁","🚄 火车","✈️ 飞机","🚢 轮船","🚲 骑车","⛽ 加油","🚗 其它"],
 "🏠 住房":["💧 水费","⚡ 电费","🌐 网费","📱 话费","🔥 燃气费","🏠 其它"],
 "📚 教育":["📖 书籍","🎓 学费","📝 考试报名费","📚 其它"],
 "🎮 娱乐":["🎤 演唱会","🎼 音乐会","🎬 电影","🎡 游乐园","🎮 游戏","🎤 KTV","✈️ 旅游","🎲 其它"],
 "🎁 人情":["🎁 礼物","🧧 发红包","☕ 打赏","💒 份子钱","❤️ 其它"],
 "🏥 医疗":["🩺 挂号费","🏥 住院费","💊 药品","🩹 其它"],
 "📦 其它":["📦 其它"]
};

document.body.insertAdjacentHTML("beforeend",`
<div id="mask" style="display:none;position:fixed;inset:0;background:#0005">
<div style="max-width:360px;margin:8vh auto;background:#fff;padding:18px;border-radius:18px;max-height:84vh;overflow-y:auto">
<h3>编辑这一笔</h3>
<label>日期</label><input class="editDateInput" id="eDate" type="date">
<label>金额</label><input id="eAmount" type="number" step="0.01" style="width:100%">
<label>这笔钱是？</label>
<select id="eType" style="width:100%"><option>💰 收入</option><option>💸 支出</option></select>
<label id="eCategoryLabel">来自哪里？</label>
<select id="eCategory" style="width:100%"></select>
<div id="eSubcategoryField">
<label>具体是什么？</label>
<select id="eSubcategory" style="width:100%"></select>
</div>
<label>备注</label><textarea id="eNote" style="width:100%;height:70px"></textarea>
<div style="margin-top:12px">
<button id="saveEdit">保存</button>
<button id="cancelEdit">取消</button>
</div>
</div></div>`);

function save(){localStorage.setItem(KEY,JSON.stringify(ledger));}

// 根据选中的支出分类更新具体项目选项，并默认选中第一个选项
// 输入参数：category，当前选中的支出分类文字；subcategorySelect，可选的具体项目下拉框
// 返回结果：无，直接更新具体项目下拉框
function updateSubcategoryOptions(category,subcategorySelect=document.getElementById("subcategory")){
 subcategorySelect.innerHTML="";
 (EXPENSE_CATEGORIES[category]||[]).forEach(subcategory=>{
   const option=document.createElement("option");
   option.value=subcategory;
   option.textContent=subcategory;
   subcategorySelect.appendChild(option);
 });
}

// 根据金额类型更新分类与具体项目控件
// 输入参数：type，当前选中的金额类型文字；其余参数为可选的目标控件
// 返回结果：无，直接更新分类选择框和具体项目区域
function updateCategoryOptions(
 type,
 categorySelect=document.getElementById("category"),
 subcategoryField=document.getElementById("subcategoryField"),
 categoryLabel=document.getElementById("categoryLabel"),
 subcategorySelect=document.getElementById("subcategory")
){
 const categories=type==="💰 收入"?INCOME_CATEGORIES:Object.keys(EXPENSE_CATEGORIES);
 categorySelect.innerHTML="";
 categories.forEach(category=>{
   const option=document.createElement("option");
   option.value=category;
   option.textContent=category;
   categorySelect.appendChild(option);
 });
 const isIncome=type==="💰 收入";
 categoryLabel.textContent=isIncome?"来自哪里？":"花在哪里？";
 subcategoryField.style.display=isIncome?"none":"block";
 if(!isIncome)updateSubcategoryOptions(categorySelect.value,subcategorySelect);
}

// 将新旧记录统一为金额类型、分类和具体项目，用于页面显示
// 输入参数：record，LocalStorage 中的一条账本记录
// 返回结果：包含 type、category、subcategory 的兼容分类对象
function getRecordClassification(record){
 if(record.type){
   return {type:record.type,category:record.category||"",subcategory:record.subcategory||""};
 }
 if(isIncomeCategory(record.category)){
   return {
     type:"💰 收入",
     category:record.category==="💰 收入"?(record.subcategory||"💰 其它"):record.category,
     subcategory:""
   };
 }
 return {type:"💸 支出",category:record.category||"📦 其它",subcategory:record.subcategory||""};
}

// 确保旧记录的分类值可以继续在编辑下拉框中被选中
// 输入参数：selectElement，目标下拉框；value，需要保留的分类文字
// 返回结果：无，必要时向下拉框补充旧分类选项
function ensureSelectValue(selectElement,value){
 if(!value||[...selectElement.options].some(option=>option.value===value))return;
 const option=document.createElement("option");
 option.value=value;
 option.textContent=value;
 selectElement.appendChild(option);
}

// 将一条记录的兼容分类填入编辑表单，并更新对应的分类控件
// 输入参数：record，需要编辑的账本记录
// 返回结果：无，直接更新编辑表单中的类型、分类和具体项目
function fillEditClassification(record){
 const classification=getRecordClassification(record);
 const editType=document.getElementById("eType");
 const editCategory=document.getElementById("eCategory");
 const editSubcategory=document.getElementById("eSubcategory");
 editType.value=classification.type;
 updateCategoryOptions(
   classification.type,
   editCategory,
   document.getElementById("eSubcategoryField"),
   document.getElementById("eCategoryLabel"),
   editSubcategory
 );
 ensureSelectValue(editCategory,classification.category);
 editCategory.value=classification.category;
 if(classification.type==="💸 支出"){
   updateSubcategoryOptions(editCategory.value,editSubcategory);
   ensureSelectValue(editSubcategory,classification.subcategory);
   editSubcategory.value=classification.subcategory||editSubcategory.value;
 }
}

// 判断分类或金额类型是否代表收入，兼容旧版收入分类
// 输入参数：category，记录中的分类或金额类型文字
// 返回结果：true 表示收入，false 表示支出
function isIncomeCategory(category){
 return category==="💰 收入"||category==="💼 收入"||INCOME_CATEGORIES.includes(category);
}

// 将金额格式化为：收入显示 +，支出显示 -，整数不显示小数，有小数时保留两位
// 输入参数：amount，记录中的金额；category，记录分类
// 返回结果：用于页面展示的金额字符串
function formatAmount(amount,category){
 const value=Number(amount)||0;
 const prefix=isIncomeCategory(category)?"+ ¥":"- ¥";
 return prefix+(Number.isInteger(value)?value:value.toFixed(2));
}

// 将记录时间转换为 Date，兼容旧版 LocalStorage 中保存的时间字符串
// 输入参数：time，记录中的时间字符串
// 返回结果：可用于格式化和分组的 Date 对象
function parseRecordTime(time){
 const timeText=String(time||"");
 const timeParts=timeText.match(/^(\d{4})[/-](\d{1,2})[/-](\d{1,2})\s+(\d{1,2}):(\d{1,2})(?::(\d{1,2}))?/);
 if(timeParts){
   return new Date(
     Number(timeParts[1]),
     Number(timeParts[2])-1,
     Number(timeParts[3]),
     Number(timeParts[4]),
     Number(timeParts[5]),
     Number(timeParts[6]||0)
   );
 }
 const recordDate=new Date(timeText);
 return Number.isNaN(recordDate.getTime())?new Date():recordDate;
}

// 将记录时间转换为原生日期输入框需要的 YYYY-MM-DD 格式
// 输入参数：time，记录中的时间字符串
// 返回结果：可直接填入 type="date" 输入框的日期字符串
function formatDateInput(time){
 const recordDate=parseRecordTime(time);
 return recordDate.getFullYear()+"-"+String(recordDate.getMonth()+1).padStart(2,"0")+"-"+String(recordDate.getDate()).padStart(2,"0");
}

// 更新记录日期并使用当前保存时间，维持 time 字段为字符串
// 输入参数：dateValue，YYYY-MM-DD 格式的新日期
// 返回结果：包含新日期和当前时分秒的时间字符串
function updateRecordDate(dateValue){
 const dateParts=dateValue.split("-").map(Number);
 const now=new Date();
 const updatedDate=new Date(
   dateParts[0],
   dateParts[1]-1,
   dateParts[2],
   now.getHours(),
   now.getMinutes(),
   now.getSeconds()
 );
 return updatedDate.toLocaleString();
}

// 将时间格式化为：20:36 / 昨天 20:36 / 7 月 3 日 / 2025/12/18
// 输入参数：time，记录中的时间字符串
// 返回结果：用于记录卡片展示的时间文字
function formatRecordTime(time){
 const recordDate=parseRecordTime(time);
 const now=new Date();
 const todayStart=new Date(now.getFullYear(),now.getMonth(),now.getDate());
 const recordStart=new Date(recordDate.getFullYear(),recordDate.getMonth(),recordDate.getDate());
 const dayDiff=Math.round((todayStart-recordStart)/86400000);
 const hours=String(recordDate.getHours()).padStart(2,"0");
 const minutes=String(recordDate.getMinutes()).padStart(2,"0");
 if(dayDiff===0)return hours+":"+minutes;
 if(dayDiff===1)return "昨天 "+hours+":"+minutes;
 if(recordDate.getFullYear()===now.getFullYear())return (recordDate.getMonth()+1)+" 月 "+recordDate.getDate()+" 日";
 return recordDate.getFullYear()+"/"+String(recordDate.getMonth()+1).padStart(2,"0")+"/"+String(recordDate.getDate()).padStart(2,"0");
}

// 将 Date 对象格式化为日历比较使用的 YYYY-MM-DD 日期键
// 输入参数：date，需要格式化的 Date 对象
// 返回结果：用于日历标记和当天记录筛选的日期字符串
function formatCalendarDateKey(date){
 return date.getFullYear()+"-"+String(date.getMonth()+1).padStart(2,"0")+"-"+String(date.getDate()).padStart(2,"0");
}

// 获取指定日期的记录，并保持从新到旧的顺序
// 输入参数：records，账本记录数组；dateKey，YYYY-MM-DD 格式的日期键
// 返回结果：指定日期的记录数组
function getRecordsForCalendarDate(records,dateKey){
 return sortRecordsByNewest(records.filter(record=>formatCalendarDateKey(parseRecordTime(record.time))===dateKey));
}

// 计算指定记录集合的收入、支出与结余
// 输入参数：records，需要汇总的账本记录数组
// 返回结果：包含 income、expense、balance 的汇总对象
function calculateRecordSummary(records){
 const summary={income:0,expense:0,balance:0};
 records.forEach(record=>{
   const amount=Number(record.amount)||0;
   if(isIncomeCategory(getRecordClassification(record).type))summary.income+=amount;
   else summary.expense+=amount;
 });
 summary.balance=summary.income-summary.expense;
 return summary;
}

// 将日期键格式化为日历当天记录区域的标题
// 输入参数：dateKey，YYYY-MM-DD 格式的日期键
// 返回结果：例如“📅 2026年7月11日”的标题文字
function formatCalendarDateTitle(dateKey){
 const dateParts=dateKey.split("-").map(Number);
 return "📅 "+dateParts[0]+"年"+dateParts[1]+"月"+dateParts[2]+"日";
}

// 渲染当前查看月份的星期标题、日期网格与账单标记
// 输入参数：无，使用当前 calendarMonthDate、selectedCalendarDate 和 ledger 数据
// 返回结果：无，直接更新日历日期网格
function renderCalendarMonth(){
 const calendarGrid=document.getElementById("calendarGrid");
 const monthTitle=document.getElementById("calendarMonthTitle");
 const year=calendarMonthDate.getFullYear();
 const month=calendarMonthDate.getMonth();
 const firstDay=new Date(year,month,1).getDay();
 const daysInMonth=new Date(year,month+1,0).getDate();
 const recordDates=new Set(ledger.map(record=>formatCalendarDateKey(parseRecordTime(record.time))));
 monthTitle.textContent=year+"年"+(month+1)+"月";
 calendarGrid.innerHTML="";
 for(let dayIndex=0;dayIndex<firstDay;dayIndex++){
   const emptyDay=document.createElement("div");
   emptyDay.className="calendarDay empty";
   calendarGrid.appendChild(emptyDay);
 }
 for(let day=1;day<=daysInMonth;day++){
   const dateKey=formatCalendarDateKey(new Date(year,month,day));
   const dayButton=document.createElement("button");
   dayButton.type="button";
   dayButton.className="calendarDay"+(dateKey===selectedCalendarDate?" selected":"");
   dayButton.innerHTML=`<span class="calendarDayNumber">${day}</span>${recordDates.has(dateKey)?"<span class='calendarDot'></span>":""}`;
   dayButton.onclick=()=>{
     selectedCalendarDate=dateKey;
     renderCalendar();
   };
   calendarGrid.appendChild(dayButton);
 }
}

// 渲染已选日期的当天小结和记录列表
// 输入参数：无，使用当前 selectedCalendarDate 和 ledger 数据
// 返回结果：无，直接更新当天记录区域
function renderCalendarDayDetails(){
 const dayRecords=getRecordsForCalendarDate(ledger,selectedCalendarDate);
 const daySummary=calculateRecordSummary(dayRecords);
 const dailySummary=document.getElementById("dailySummary");
 const dayList=document.getElementById("calendarDayList");
 const balanceClass=daySummary.balance>0?" income":"";
 document.getElementById("calendarSelectedDate").textContent=formatCalendarDateTitle(selectedCalendarDate);
 dailySummary.innerHTML=`<span>收入<strong class="income">${formatAmount(daySummary.income,"💰 收入")}</strong></span><span>支出<strong>${formatAmount(daySummary.expense,"💸 支出")}</strong></span><span>结余<strong class="${balanceClass.trim()}">${formatBalanceAmount(daySummary.balance)}</strong></span>`;
 dayList.innerHTML="";
 if(!dayRecords.length){dayList.innerHTML="<div class='small'>暂无记录。</div>";return;}
 dayRecords.forEach(record=>{
   const classification=getRecordClassification(record);
   const label=classification.subcategory?classification.subcategory+" · "+classification.category:classification.category;
   const row=document.createElement("div");
   const amountClass=isIncomeCategory(classification.type)?"calendarRecordAmount income":"calendarRecordAmount";
   row.className="calendarRecord";
   row.innerHTML=`<span class="calendarRecordLabel">${label}</span><span class="${amountClass}">${formatAmount(record.amount,classification.type)}</span>`;
   dayList.appendChild(row);
 });
}

// 渲染当前月份的日历与已选日期详情
// 输入参数：无，使用日历当前状态和 ledger 数据
// 返回结果：无，更新整个日历查看区域
function renderCalendar(){
 renderCalendarMonth();
 renderCalendarDayDetails();
}

// 切换日历查看月份并默认选中目标月第一天
// 输入参数：monthOffset，月份偏移量，-1 为上月，1 为下月
// 返回结果：无，更新日历月份和当天记录区域
function changeCalendarMonth(monthOffset){
 calendarMonthDate=new Date(calendarMonthDate.getFullYear(),calendarMonthDate.getMonth()+monthOffset,1);
 selectedCalendarDate=formatCalendarDateKey(calendarMonthDate);
 renderCalendar();
}

// 将记录时间格式化为分组标题：今天 / 昨天 / 7 月 3 日 / 2025/12/18
// 输入参数：time，记录中的时间字符串
// 返回结果：用于账本分组标题的文字
function formatGroupTitle(time){
 const recordDate=parseRecordTime(time);
 const now=new Date();
 const todayStart=new Date(now.getFullYear(),now.getMonth(),now.getDate());
 const recordStart=new Date(recordDate.getFullYear(),recordDate.getMonth(),recordDate.getDate());
 const dayDiff=Math.round((todayStart-recordStart)/86400000);
 if(dayDiff===0)return "今天";
 if(dayDiff===1)return "昨天";
 if(recordDate.getFullYear()===now.getFullYear())return (recordDate.getMonth()+1)+" 月 "+recordDate.getDate()+" 日";
 return recordDate.getFullYear()+"/"+String(recordDate.getMonth()+1).padStart(2,"0")+"/"+String(recordDate.getDate()).padStart(2,"0");
}

// 将账本记录按时间从新到旧排序
// 输入参数：records，账本记录数组
// 返回结果：按记录时间从新到旧排列的新数组
function sortRecordsByNewest(records){
 return [...records].sort((firstRecord,secondRecord)=>parseRecordTime(secondRecord.time)-parseRecordTime(firstRecord.time));
}

// 按日期将账本记录分组，保持记录从新到旧展示
// 输入参数：records，账本记录数组
// 返回结果：包含标题和记录列表的分组数组
function groupLedgerByDate(records){
 const groupedLedger=[];
 sortRecordsByNewest(records).forEach(record=>{
   const title=formatGroupTitle(record.time);
   let currentGroup=groupedLedger.find(group=>group.title===title);
   if(!currentGroup){
     currentGroup={title:title,records:[]};
     groupedLedger.push(currentGroup);
   }
   currentGroup.records.push(record);
 });
 return groupedLedger;
}

// 获取首页需要展示的最近记录
// 输入参数：records，账本记录数组
// 返回结果：最多包含三条最新记录的数组
function getRecentRecords(records){
 return sortRecordsByNewest(records).slice(0,3);
}

// 计算当前自然月的收入、支出和结余，兼容没有 type 字段的旧记录
// 输入参数：无，使用当前 ledger 数据和系统当前日期
// 返回结果：包含 income、expense、balance 的本月汇总对象
function calculateMonthlySummary(){
 const now=new Date();
 const monthlySummary={income:0,expense:0,balance:0};
 ledger.forEach(record=>{
   const recordDate=parseRecordTime(record.time);
   if(recordDate.getFullYear()!==now.getFullYear()||recordDate.getMonth()!==now.getMonth())return;
   const amount=Number(record.amount)||0;
   if(isIncomeCategory(getRecordClassification(record).type))monthlySummary.income+=amount;
   else monthlySummary.expense+=amount;
 });
 monthlySummary.balance=monthlySummary.income-monthlySummary.expense;
 return monthlySummary;
}

// 将结余格式化为带正负号的金额，零结余不显示正负号
// 输入参数：balance，本月收入减支出的结余数值
// 返回结果：用于本月小结展示的结余金额字符串
function formatBalanceAmount(balance){
 if(balance===0)return "¥0";
 return formatAmount(Math.abs(balance),balance>0?"💰 收入":"💸 支出");
}

// 将本月汇总结果显示在本月小结区域
// 输入参数：无，使用 calculateMonthlySummary 的计算结果
// 返回结果：无，直接更新本月小结中的金额文字和颜色
function renderMonthlySummary(){
 const monthlySummary=calculateMonthlySummary();
 const balanceElement=document.getElementById("monthlyBalance");
 document.getElementById("monthlyIncome").textContent=formatAmount(monthlySummary.income,"💰 收入");
 document.getElementById("monthlyExpense").textContent=formatAmount(monthlySummary.expense,"💸 支出");
 balanceElement.textContent=formatBalanceAmount(monthlySummary.balance);
 balanceElement.classList.toggle("income",monthlySummary.balance>0);
}

// 将指定记录渲染为按日期分组的账本卡片
// 输入参数：records，需要展示的记录数组；container，承载记录的页面元素
// 返回结果：无，直接更新指定容器内容
function renderRecordList(records,container){
 container.innerHTML="";
 if(!records.length){container.innerHTML="<div class='small'>暂无记录。</div>";return;}
 groupLedgerByDate(records).forEach(group=>{
   const groupElement=document.createElement("div");
   groupElement.className="dateGroup";
   groupElement.innerHTML=`<div class="dateTitle">${group.title}</div>`;
   group.records.forEach(item=>{
   const row=document.createElement("div");
   row.className="item";
   const classification=getRecordClassification(item);
   const amountClass=isIncomeCategory(classification.type)?"amount income":"amount";
   const category="<span class='subcategory'>"+classification.category+"</span>";
   const subcategory=classification.subcategory?"<span class='subcategory'>"+classification.subcategory+"</span>":"";
   row.innerHTML=`<b>${classification.type}</b>${category}${subcategory}<span class="${amountClass}">${formatAmount(item.amount,classification.type)}</span><span class='small record-time'>${formatRecordTime(item.time)}</span>${item.note?"<span class='small record-note'>"+item.note+"</span>":""}`;
   const actions=document.createElement("div");
   actions.className="actions";
   const eb=document.createElement("button");
   eb.className="iconBtn";
   eb.textContent="✎";
   eb.title="编辑";
   eb.setAttribute("aria-label","编辑");
   eb.onclick=()=>openEdit(item.id);
   const db=document.createElement("button");
   db.className="iconBtn delete";
   db.textContent="×";
   db.title="删除";
   db.setAttribute("aria-label","删除");
   db.onclick=()=>removeItem(item.id);
   actions.appendChild(eb); actions.appendChild(db);
   row.appendChild(actions);
   groupElement.appendChild(row);
   });
   container.appendChild(groupElement);
 });
}

// 将最近记录渲染为首页使用的紧凑两行样式
// 输入参数：records，需要展示的最近记录数组；container，承载记录的页面元素
// 返回结果：无，直接更新首页最近记录区域
function renderRecentRecords(records,container){
 container.innerHTML="";
 if(!records.length){container.innerHTML="<div class='small'>暂无记录。</div>";return;}
 records.forEach(item=>{
   const classification=getRecordClassification(item);
   const label=classification.subcategory?
     classification.subcategory+" · "+classification.category:
     classification.category+" · "+classification.type;
   const row=document.createElement("div");
   row.className="recentItem";
   const amountClass=isIncomeCategory(classification.type)?"recentAmount income":"recentAmount";
   row.innerHTML=`<div class="recentMain"><span class="recentLabel">${label}</span><span class="${amountClass}">${formatAmount(item.amount,classification.type)}</span></div><span class="recentTime">${formatRecordTime(item.time)}</span>`;
   container.appendChild(row);
 });
}

function render(){
 renderMonthlySummary();
 renderRecentRecords(getRecentRecords(ledger),document.getElementById("recentList"));
 renderRecordList(ledger,document.getElementById("fullLedgerList"));
 renderCalendar();
}

// 打开完整账本的全屏查看页面
// 输入参数：无
// 返回结果：无，显示完整账本页面
function showFullLedger(){
 document.getElementById("fullLedgerView").style.display="block";
}

// 关闭完整账本页面并返回首页
// 输入参数：无
// 返回结果：无，隐藏完整账本页面
function hideFullLedger(){
 document.getElementById("fullLedgerView").style.display="none";
}

// 打开日历全屏查看页面并刷新当前月份数据
// 输入参数：无
// 返回结果：无，显示日历页面
function showCalendar(){
 document.getElementById("fullCalendarView").style.display="block";
 renderCalendar();
}

// 关闭日历全屏页面并返回首页
// 输入参数：无
// 返回结果：无，隐藏日历页面
function hideCalendar(){
 document.getElementById("fullCalendarView").style.display="none";
}

document.getElementById("viewLedgerBtn").onclick=showFullLedger;
document.getElementById("backToHome").onclick=hideFullLedger;
document.getElementById("viewCalendarBtn").onclick=showCalendar;
document.getElementById("backFromCalendar").onclick=hideCalendar;
document.getElementById("previousMonthBtn").onclick=()=>changeCalendarMonth(-1);
document.getElementById("nextMonthBtn").onclick=()=>changeCalendarMonth(1);

function openEdit(id){
 editingId=id;
 const it=ledger.find(x=>x.id===id);
 document.getElementById("eDate").value=formatDateInput(it.time);
 document.getElementById("eAmount").value=it.amount;
 fillEditClassification(it);
 document.getElementById("eNote").value=it.note||"";
 document.getElementById("mask").style.display="block";
}
document.getElementById("cancelEdit").onclick=()=>mask.style.display="none";
document.getElementById("saveEdit").onclick=()=>{
 const it=ledger.find(x=>x.id===editingId);
 const editedDate=document.getElementById("eDate").value;
 const originalDate=formatDateInput(it.time);
 it.amount=parseFloat(document.getElementById("eAmount").value)||0;
 it.type=document.getElementById("eType").value;
 it.category=document.getElementById("eCategory").value;
 it.subcategory=it.type==="💸 支出"?document.getElementById("eSubcategory").value:"";
 it.note=document.getElementById("eNote").value;
 if(editedDate&&editedDate!==originalDate)it.time=updateRecordDate(editedDate);
 save(); render();
 document.getElementById("ash").textContent="✓ 已修改";
 mask.style.display="none";
};
document.getElementById("eType").onchange=event=>updateCategoryOptions(
 event.target.value,
 document.getElementById("eCategory"),
 document.getElementById("eSubcategoryField"),
 document.getElementById("eCategoryLabel"),
 document.getElementById("eSubcategory")
);
document.getElementById("eCategory").onchange=event=>updateSubcategoryOptions(
 event.target.value,
 document.getElementById("eSubcategory")
);
let deletingId=null;
function removeItem(id){
 deletingId=id;
 document.getElementById("deleteMask").style.display="block";
}
document.addEventListener("DOMContentLoaded",()=>{
 document.getElementById("cancelDelete").onclick=()=>document.getElementById("deleteMask").style.display="none";
 document.getElementById("confirmDelete").onclick=()=>{
   ledger=ledger.filter(x=>x.id!==deletingId);
   save(); render();
   document.getElementById("ash").textContent="🤍 这一笔已经从我们的小账本里拿出来了。";
   document.getElementById("deleteMask").style.display="none";
 };
});

document.getElementById("saveBtn").onclick=()=>{
 const amountInput=document.getElementById("amount");
 const noteInput=document.getElementById("note");
 const typeSelect=document.getElementById("type");
 const categorySelect=document.getElementById("category");
 const subcategorySelect=document.getElementById("subcategory");
 const amount=amountInput.value.trim();
 if(!amount)return;
 ledger.push({
   id:crypto.randomUUID?crypto.randomUUID():String(Date.now()),
   amount:parseFloat(amount),
   type:typeSelect.value,
   category:categorySelect.value,
   subcategory:typeSelect.value==="💸 支出"?subcategorySelect.value:"",
   note:noteInput.value.trim(),
   time:new Date().toLocaleString()
 });
 document.getElementById("ash").textContent="📖 正在放进我们的小账本……";
 save();
 setTimeout(()=>{
   render();
   document.getElementById("ash").textContent=MSGS[Math.floor(Math.random()*MSGS.length)];
   amountInput.value="";
   noteInput.value="";
 },400);
};
document.getElementById("type").onchange=event=>updateCategoryOptions(event.target.value);
document.getElementById("category").onchange=event=>updateSubcategoryOptions(event.target.value);
updateCategoryOptions(document.getElementById("type").value);
render();
</script>

<button id="cancelDelete">取消</button>
<button id="confirmDelete">删除</button>
</div>
</div>
</div>
